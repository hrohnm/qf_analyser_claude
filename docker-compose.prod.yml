services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: qf_analyser
      POSTGRES_USER: qf_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qf_user -d qf_analyser"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://qf_user:${DB_PASSWORD}@db:5432/qf_analyser
      DATABASE_URL_SYNC: postgresql+psycopg2://qf_user:${DB_PASSWORD}@db:5432/qf_analyser
      ENVIRONMENT: production
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
